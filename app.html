<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="app.css"/>
    <script src="app.js" type="module" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid vh-100 d-flex px-0 flex-column">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <span class="navbar-brand px-3">Praxis</span>
            <button class="btn btn-icon ms-auto text-muted px-3" id="logoutBtn">Logout&nbsp;&nbsp;<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/><path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/></svg></button>
        </nav>
        <div class="row flex-grow-1">
            <div class="col-2 bg-light px-0">
                <nav class="nav text-center flex-column w-100 side-nav">
                    <a href="#" class="nav-link active" aria-current="true" data-target="evidenceSection">Evidence&nbsp;&nbsp;<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-book" viewBox="0 0 16 16"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/></svg></a>
                    <a href="#" class="nav-link" data-target="uploadSection">Upload Evidence</a>
                    <a href="#" class="nav-link" data-target="thirdSection">A third link item</a>
                    <a href="#" class="nav-link" data-target="fourthSection">A fourth link item</a>
                </nav>
            </div>
            <div class="col-10 px-3">
                <!-- Sections -->
                <section id="evidenceSection">
                    <h2>Evidence</h2>
                </section>
                <section id="uploadSection" class="me-3" style="display:none;">
                    <h2>Upload Evidence</h2>
                    <form id="uploadForm" novalidate>
                        <div class="mb-3 d-flex justify-content-evenly">
                            <div class="mb-3 w-50">
                                <label for="uploadTitle" class="form-label">Tag<span class="red">*</span></label>
                                <input type="text" class="form-control" id="uploadTitle">
                            </div>
                            <div class="mb-3">
                                <label for="author" class="form-label">Author<span class="red">*</span></label>
                                <input type="text" class="form-control" id="author">
                            </div>
                            <div class="mb-3">
                                <label for="year" class="form-label">Year<span class="red">*</span></label>
                                <input type="text" class="form-control" id="year">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="cardEditor" class="form-label">Content<span class="red">*</span></label>
                            <div id="cardEditor" class="form-control" style="height: 400px;"></div>
                        </div>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </form>
                </section>
            </div>
        </div>
    </div>
<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
</body>
</html>
